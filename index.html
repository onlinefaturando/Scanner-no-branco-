<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Scanner Números</title>
    <style>
        body { font-family: sans-serif; background:#0f172a; color:#fff; text-align:center; padding:20px; }
        .card { background:#1e293b; padding:20px; border-radius:15px; margin:10px auto; max-width:400px; }
        .grid-numeros { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        
        /* Cores dos Botões */
        .btn-n { padding:10px; border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer; }
        .vermelho { background: #ef4444; }
        .preto { background: #1e293b; border: 1px solid #334155; }
        .branco { background: #f8fafc; color: #000; }
        
        .historico { background: #0f172a; padding: 10px; border-radius: 10px; min-height: 40px; margin-bottom: 15px; word-wrap: break-word; }
        .alert { font-size:18px; font-weight: bold; color: #22c55e; }
        .limpar { background: #64748b; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<h2>⚪ Pro Scanner (Números)</h2>

<div class="card">
    <div class="grid-numeros">
        <!-- Botão Branco -->
        <button class="btn-n branco" onclick="addNum(0)">0</button>
        <!-- Vermelhos -->
        <button class="btn-n vermelho" onclick="addNum(1)">1</button>
        <button class="btn-n vermelho" onclick="addNum(2)">2</button>
        <button class="btn-n vermelho" onclick="addNum(3)">3</button>
        <button class="btn-n vermelho" onclick="addNum(4)">4</button>
        <button class="btn-n vermelho" onclick="addNum(5)">5</button>
        <button class="btn-n vermelho" onclick="addNum(6)">6</button>
        <button class="btn-n vermelho" onclick="addNum(7)">7</button>
        <!-- Pretos -->
        <button class="btn-n preto" onclick="addNum(8)">8</button>
        <button class="btn-n preto" onclick="addNum(9)">9</button>
        <button class="btn-n preto" onclick="addNum(10)">10</button>
        <button class="btn-n preto" onclick="addNum(11)">11</button>
        <button class="btn-n preto" onclick="addNum(12)">12</button>
        <button class="btn-n preto" onclick="addNum(13)">13</button>
        <button class="btn-n preto" onclick="addNum(14)">14</button>
    </div>

    <p>Histórico recente:</p>
    <div class="historico" id="historico"></div>
    
    <div class="alert" id="saida">Aguardando dados...</div>
    
    <button class="limpar" onclick="limpar()">Limpar Histórico</button>
</div>

<script>
    let seqNumeros = [];
    let seqCores = [];

    function addNum(n) {
        seqNumeros.push(n);
        
        // Associação Número -> Cor
        let cor = "";
        if (n === 0) cor = "W";
        else if (n >= 1 && n <= 7) cor = "R";
        else cor = "B";
        
        seqCores.push(cor);
        atualizarTela();
        analisar();
    }

    function atualizarTela() {
        document.getElementById('historico').innerText = seqNumeros.join(' → ');
    }

        let semBranco = 0;
        for (let i = seqCores.length - 1; i >= 0; i--) {
            if (seqCores[i] === 'W') break;
            semBranco++;
        }

        let ultimasCores = seqCores.slice(-6).join('');
        let ultimoNum = seqNumeros[seqNumeros.length - 1];
        
        let alternancia = /(RB){2,}|(BR){2,}/.test(ultimasCores);
        let repeticao = /(RRR|BBB)/.test(ultimasCores);

        // Lógica com base nos números e cores

            saida = "⚪ Branco detectado! Resetando contagem.";

        } else if (ultimoNum === 7 || ultimoNum === 8) {
