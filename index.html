<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Scanner - ULTIMATE</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --neon-green: #22c55e; --dark-bg: #020617; --card-bg: #1e293b; --panic-red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #334155; position: relative; }
        
        /* Dashboard */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: #0f172a; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: var(--neon-green); }
        
        /* Botões */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-main { background: var(--neon-green); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; grid-column: span 2; }
        .btn-panic { background: var(--panic-red); color: #fff; border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-export { background: #3b82f6; color: #fff; border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        canvas { background: #0f172a; border-radius: 12px; padding: 10px; margin-bottom: 15px; }
        input { background: #0f172a; border: 1px solid #334155; color: #fff; padding: 15px; width: 92%; border-radius: 12px; text-align: center; margin-bottom: 10px; }
        
        .pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="timerCard">
        <div id="relogio" style="font-size: 28px; font-weight: bold;">00:00:00</div>
        <div id="statusMinuto">Aguardando janela...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><span style="font-size:10px; color:#94a3b8;">BANCA TESTE</span><span class="stat-val" id="bancaTxt">R$ 100,00</span></div>
        <div class="stat-item"><span style="font-size:10px; color:#94a3b8;">WIN RATE</span><span class="stat-val" id="winRate">0%</span></div>
    </div>

    <canvas id="meuGrafico" height="140"></canvas>

    <div class="card">
        <input id="inputCores" placeholder="Últimas cores (Ex: R,B,W)">
        <button class="btn-main" onclick="processar()">ANALISAR ENTRADA</button>
        
        <div class="btn-group">
            <button class="btn-panic" onclick="panicReset()">PÂNICO (RESET)</button>
            <button class="btn-export" onclick="exportarRelatorio()">EXPORTAR LOG</button>
        </div>
    </div>
</div>

<script>
    let banca = 100.00;
    let acertos = 0;
    let total = 0;
    let historicoAcoes = ["Início: R$ 100,00"];

    // Config Gráfico
    const ctx = document.getElementById('meuGrafico').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: ['0'], datasets: [{ data: [100], borderColor: '#22c55e', tension: 0.3, fill: false }] },
        options: { plugins: { legend: false }, scales: { y: { display: false }, x: { display: false } } }
    });

    function atualizarRelogio() {
        const agora = new Date();
        const m = agora.getMinutes();
        document.getElementById('relogio').innerText = agora.toLocaleTimeString();
        const alvos = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
        const status = document.getElementById('statusMinuto');
        const card = document.getElementById('timerCard');
