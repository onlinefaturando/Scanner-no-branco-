<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>White Scanner Pro</title>
    <style>
        body { font-family: sans-serif; background:#0f172a; color:#fff; text-align:center; padding:10px; margin:0; }
        .card { background:#1e293b; padding:20px; border-radius:20px; margin:10px auto; max-width:400px; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
        
        /* Botões de Cores */
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .btn-color { flex: 1; padding: 25px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.1s; }
        .btn-red { background: #ef4444; color: white; }
        .btn-black { background: #000; color: white; border: 1px solid #3f3f46; }
        .btn-white { background: #fff; color: #000; }
        .btn-color:active { transform: scale(0.9); }

        /* Histórico */
        #input-visual { background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 15px; min-height: 20px; color: #22c55e; font-family: monospace; }
        
        /* Alertas */
        .alert { font-size: 18px; font-weight: bold; padding: 20px; border-radius: 12px; margin-bottom: 10px; }
        .status-wait { background: #334155; color: #94a3b8; }
        .status-go { background: #14532d; color: #22c55e; border: 2px solid #22c55e; animation: flash 1s infinite; }
        
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        .btn-clear { background: none; color: #ef4444; border: 1px solid #ef4444; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⚪ White Scanner Pro</h2>
        <p>Toque na cor que saiu na roleta:</p>

        <div class="btn-group">
            <button class="btn-color btn-red" onclick="add('R')">VERMELHO</button>
            <button class="btn-color btn-black" onclick="add('B')">PRETO</button>
            <button class="btn-color btn-white" onclick="add('W')">BRANCO</button>
        </div>

        <div id="input-visual">Aguardando...</div>
        <div class="alert status-wait" id="saida">SEM SINAL</div>
        <button class="btn-clear" onclick="limpar()">LIMPAR TUDO</button>
    </div>

<script>
    let historico = [];

    function add(cor) {
        historico.push(cor);
        if (historico.length > 40) historico.shift();
        document.getElementById('input-visual').innerText = historico.join(', ');
        analisar();
    }

    function limpar() {
        historico = [];
        document.getElementById('input-visual').innerText = "Aguardando...";
        let s = document.getElementById('saida');
        s.innerText = "SEM SINAL";
        s.className = "alert status-wait";
    }

    function analisar() {
        let semBranco = 0;
        for (let i = historico.length - 1; i >= 0; i--) {
            if (historico[i] === 'W') break;
            semBranco++;
        }

        let ultimos = historico.slice(-6).join('');
        let alternancia = /(RB){2,}|(BR){2,}/.test(ultimos);
        let s = document.getElementById('saida');

        if (historico[historico.length-1] === 'W') {
            s.innerText = "⚪ BRANCO SAIU!";
            s.className = "alert status-wait";
        } else if (semBranco >= 10 && alternancia) {
            s.innerText = "🔥 ENTRAR NO BRANCO AGORA!";
            s.className = "alert status-go";
        } else {
            s.innerText = "❌ AGUARDE (" + semBranco + " rodadas s/ Branco)";
            s.className = "alert status-wait";
        }
    }
</script>
</body>
</html>
