<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>White Scanner Pro</title>
    <!-- Configuração para virar Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background:#0f172a; color:#fff; text-align:center; padding:15px; margin:0; }
        .card { background:#1e293b; padding:20px; border-radius:20px; margin:10px auto; max-width:400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .btn-color { padding:25px 0; border:none; border-radius:15px; font-weight:bold; font-size:22px; cursor:pointer; transition: 0.2s; color: #fff; }
        .btn-color:active { transform: scale(0.9); opacity: 0.8; }
        
        /* Cores dos botões */
        .btn-red { background: #ef4444; box-shadow: 0 4px 0 #991b1b; }
        .btn-white { background: #ffffff; color: #000; box-shadow: 0 4px 0 #cbd5e1; }
        .btn-black { background: #111827; border: 1px solid #334155; box-shadow: 0 4px 0 #000; }

        input { padding:15px; border-radius:12px; border:1px solid #334155; width:90%; font-size:14px; margin-bottom: 20px; background: #0f172a; color: #94a3b8; text-align: center; pointer-events: none; }
        
        .clear-btn { background:transparent; color:#ef4444; border: 1px solid #ef4444; padding:10px; width:100%; border-radius:12px; cursor:pointer; font-weight: bold; margin-top: 10px; }
        
        .alert { font-size:18px; margin-top:20px; font-weight: bold; padding: 20px; border-radius: 12px; min-height: 25px; transition: 0.3s; }
        .status-badge { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <h2 style="margin-top:20px">⚪ White Scanner</h2>

    <div class="card">
        <span class="status-badge">Toque na cor que saiu:</span>
        <div class="btn-grid">
            <button onclick="addCor('R')" class="btn-color btn-red">R</button>
            <button onclick="addCor('W')" class="btn-color btn-white">W</button>
            <button onclick="addCor('B')" class="btn-color btn-black">B</button>
        </div>

        <input type="text" id="input" placeholder="Aguardando dados...">
        
        <div class="alert" id="saida">Aguardando sequência...</div>

        <button onclick="limpar()" class="clear-btn">LIMPAR HISTÓRICO</button>
    </div>

<script>
    // Carrega o histórico salvo assim que abre o app
    window.onload = function() {
        const salvo = localStorage.getItem('historico_scanner');
        if (salvo) {
            document.getElementById('input').value = salvo;
            analisar();
        }
    };

    function addCor(cor) {
        let campo = document.getElementById('input');
        let atual = campo.value;
        // Adiciona a cor e salva no celular
        campo.value = atual === "" ? cor : atual + "," + cor;
        localStorage.setItem('historico_scanner', campo.value);
        analisar();
    }

    function limpar() {
        if(confirm("Deseja apagar o histórico atual?")) {
            document.getElementById('input').value = "";
            document.getElementById('saida').innerText = "Histórico limpo";
            document.getElementById('saida').style.background = "transparent";
            localStorage.removeItem('historico_scanner');
        }
    }

    function analisar() {
        let entrada = document.getElementById('input').value.toUpperCase();
        let arr = entrada.split(',');
        let elementoSaida = document.getElementById('saida');
        
        // Conta quantas casas faz que o branco (W) não sai
        let semBranco = 0;
        for (let i = arr.length - 1; i >= 0; i--) {
            if (arr[i] === 'W') break;
            semBranco++;
        }

        // Padrões (Últimas 6 cores)
        let ultimos = arr.slice(-6).join('');
        let alternancia = /(RB){2,}|(BR){2,}/.test(ultimos);
        let repeticao = /(RRR|BBB)/.test(ultimos);
        
        // --- LÓGICA DE ALERTA ---
        if (arr[arr.length - 1] === 'W') {
            exibir("⚪ BRANCO SAIU! Aguardando novo ciclo...", "#334155");
        } else if (semBranco >= 15 && alternancia) {
            exibir("🔥 ENTRAR AGORA! (Padrão de Alternância)", "#166534");
        } else if (semBranco >= 30 && !repeticao) {
            exibir("🚨 ALTA PROBABILIDADE (Cluster Ativo)", "#92400e");
        } else {
            exibir("⌛ Analisando... (" + semBranco + " casas sem W)", "transparent");
        }
    }

    function exibir(txt, corFundo) {
        let saida = document.getElementById('saida');
        saida.innerText = txt;
        saida.style.background = corFundo;
    }
</script>
</body>
</html>
