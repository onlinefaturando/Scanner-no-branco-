<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Scanner Pro</title>
    <style>
        body { font-family: sans-serif; background:#0f172a; color:#fff; text-align:center; padding:20px; }
        .card { background:#1e293b; padding:20px; border-radius:15px; margin:10px auto; max-width:400px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        button { padding:15px; border:none; border-radius:12px; background:#22c55e; color:#000; font-weight:bold; width:100%; font-size:18px; cursor: pointer; margin-top: 10px; }
        input { padding:15px; border-radius:12px; border:2px solid #334155; width:90%; font-size:16px; background: #0f172a; color: #fff; text-transform: uppercase; }
        .alert { font-size:18px; margin:20px 0; font-weight: bold; min-height: 24px; color: #22c55e; }
        .history { display: flex; justify-content: center; gap: 5px; margin-top: 15px; flex-wrap: wrap; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 1px solid #fff; }
        .dot.R { background: #ef4444; } .dot.B { background: #000; } .dot.W { background: #fff; }
    </style>
</head>
<body>
    <h2>⚪ White Scanner Pro</h2>
    <div class="card">
        <p>Insira a sequência (ex: R,B,W,R):</p>
        <input id="input" placeholder="R, B, R, B..." autocomplete="off">
        <button onclick="analisar()">ESCANEAR AGORA</button>
        <div class="alert" id="saida">Aguardando dados...</div>
        <div class="history" id="historico"></div>
    </div>

<script>
    function analisar(){
        const campo = document.getElementById('input');
        const saida = document.getElementById('saida');
        const histDiv = document.getElementById('historico');
        
        // Limpa espaços e cria array
        let arr = campo.value.toUpperCase().split(',').map(i => i.trim()).filter(i => i !== "");

        if(arr.length === 0) {
            saida.innerText = "⚠️ Digite algo!";
            return;
        }

        // Desenha histórico visual
        histDiv.innerHTML = "";
        arr.slice(-10).forEach(cor => {
            let dot = document.createElement('div');
            dot.className = `dot ${cor}`;
            histDiv.appendChild(dot);
        });

        // Lógica de análise
        let semBranco = 0;
        for(let i = arr.length - 1; i >= 0; i--){
            if(arr[i] === 'W') break;
            semBranco++;
        }

        let ultimos = arr.slice(-6).join('');
        let alternancia = /(RB){2,}|(BR){2,}/.test(ultimos);
        let repeticao = /(RRR|BBB)/.test(ultimos);

        if(semBranco >= 35 && arr[arr.length-1] === 'W'){
            saida.innerText = "⚪ Branco saiu! Aguardando novo ciclo.";
        } else if(semBranco >= 20 && alternancia){
            saida.innerText = "🔥 ENTRAR AGORA (Alta chance Branco)";
            saida.style.color = "#fbbf24";
        } else if(semBranco >= 35 && !repeticao){
            saida.innerText = "🚨 CLUSTER ATIVO (Possível Duplo)";
            saida.style.color = "#f87171";
        } else{
            saida.innerText = "❌ Aguarde (" + semBranco + " rodadas sem W)";
            saida.style.color = "#94a3b8";
        }
    }
</script>
</body>
</html>
