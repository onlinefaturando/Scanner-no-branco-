
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Branco</title>
    <style>
        body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; text-align:center; padding:20px; }
        .card { background:#1e293b; padding:20px; border-radius:15px; max-width:400px; margin:auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { width:90%; padding:15px; margin:10px 0; border-radius:10px; border:none; font-size:16px; text-align:center; }
        button { width:95%; padding:15px; background:#22c55e; border:none; border-radius:10px; font-weight:bold; font-size:18px; cursor:pointer; }
        #saida { margin-top:20px; font-weight:bold; font-size:20px; min-height:30px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚪ White Scanner</h2>
        <p>Digite a sequência (Ex: R,B,R,W)</p>
        <input type="text" id="input" placeholder="R, B, R, W...">
        <button onclick="analisar()">ESCANEAR</button>
        <div id="saida">Aguardando dados...</div>
    </div>

    <script>
        function analisar() {
            let campo = document.getElementById('input');
            let saida = document.getElementById('saida');
            let entrada = campo.value.toUpperCase().replace(/\s/g, '');
            
            if (!entrada) {
                saida.innerText = "⚠️ Digite algo!";
                return;
            }

            let arr = entrada.split(',');
            let semBranco = 0;

            for (let i = arr.length - 1; i >= 0; i--) {
                if (arr[i] === 'W') break;
                semBranco++;
            }

            let ultimos = arr.slice(-6).join('');
            let alternancia = /(RB){2,}|(BR){2,}/.test(ultimos);
            let repeticao = /(RRR|BBB)/.test(ultimos);

            if (arr[arr.length - 1] === 'W') {
                saida.innerText = "⚪ Branco saiu!";
                saida.style.color = "#fff";
            } else if (semBranco >= 20 && alternancia) {
                saida.innerText = "🔥 ENTRAR AGORA";
                saida.style.color = "#22c55e";
            } else if (semBranco >= 35 && !repeticao) {
                saida.innerText = "🚨 CLUSTER ATIVO";
                saida.style.color = "#fbbf24";
            } else {
                saida.innerText = "❌ Aguarde cenário";
                saida.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
