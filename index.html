<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Scanner App</title>
    <link rel="manifest" href="data:application/json,{\"name\":\"White Scanner\",\"short_name\":\"Scanner\",\"start_url\":\".\",\"display\":\"standalone\",\"background_color\":\"#0f172a\",\"theme_color\":\"#22c55e\"}">
    <style>
        body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; text-align:center; padding:20px; }
        .card { background:#1e293b; padding:20px; border-radius:15px; margin:10px auto; max-width:400px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button { padding:15px; border:none; border-radius:12px; background:#22c55e; color:#000; font-weight:bold; width:100%; font-size:18px; cursor:pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); background:#16a34a; }
        input { padding:15px; border-radius:12px; border:none; width:90%; font-size:16px; margin-bottom: 15px; text-align: center; background: #334155; color: white; }
        .alert { font-size:18px; margin-top:20px; font-weight: bold; min-height: 25px; }
        p { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

    <h2>⚪ White Scanner (App)</h2>

    <div class="card">
        <p>Digite a sequência (ex: R,B,R,B,W)</p>
        <input type="text" id="input" placeholder="R, B, R, B, W" autocomplete="off">
        <br>
        <button onclick="analisar()">ESCANEAR</button>
        <div class="alert" id="saida"></div>
    </div>

<script>
    function analisar() {
        // Captura o valor e limpa espaços extras
        let campo = document.getElementById('input');
        let entrada = campo.value.toUpperCase().replace(/\s/g, '');
        
        if (!entrada) {
            document.getElementById('saida').innerText = "⚠️ Digite algo primeiro!";
            return;
        }

        let arr = entrada.split(',');
        let semBranco = 0;

        // Lógica para contar casas sem sair o Branco (W)
        for (let i = arr.length - 1; i >= 0; i--) {
            if (arr[i] === 'W') break;
            semBranco++;
        }

        // Pega os últimos 6 resultados para padrões
        let ultimos = arr.slice(-6).join('');
        let alternancia = /(RB){2,}|(BR){2,}/.test(ultimos);
        let repeticao = /(RRR|BBB)/.test(ultimos);
        
        let elementoSaida = document.getElementById('saida');
        let msg = "";

        // Regras de Alerta
        if (arr[arr.length - 1] === 'W') {
            msg = "⚪ Branco saiu! Aguardando próximo.";
            elementoSaida.style.color = "#fff";
        } else if (semBranco >= 20 && alternancia) {
            msg = "🔥 ENTRAR AGORA (Alta chance branco)";
            elementoSaida.style.color = "#22c55e";
        } else if (semBranco >= 35 && !repeticao) {
            msg = "🚨 CLUSTER ATIVO (Duplo/Triplo possível)";
            elementoSaida.style.color = "#fbbf24";
        } else {
            msg = "❌ Aguarde melhor cenário";
            elementoSaida.style.color = "#ef4444";
        }

        elementoSaida.innerText = msg;
    }
</script>

</body>
</html>
